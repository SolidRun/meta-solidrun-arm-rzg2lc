# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
# Explicitly list to avoid wildcard matching dynamic-layers subdirectory
BBFILES += "${LAYERDIR}/recipes-bsp/*/*.bb \
            ${LAYERDIR}/recipes-bsp/*/*.bbappend \
            ${LAYERDIR}/recipes-graphics/*/*.bb \
            ${LAYERDIR}/recipes-graphics/*/*.bbappend \
            ${LAYERDIR}/recipes-kernel/*/*.bb \
            ${LAYERDIR}/recipes-kernel/*/*.bbappend \
            ${LAYERDIR}/recipes-kernel/*/*/*.bb \
            ${LAYERDIR}/recipes-kernel/*/*/*.bbappend \
            ${LAYERDIR}/recipes-multimedia/*/*.bb \
            ${LAYERDIR}/recipes-multimedia/*/*.bbappend \
            ${LAYERDIR}/recipes-rz-boards-compat/*/*.bb \
            ${LAYERDIR}/recipes-rz-boards-compat/*/*.bbappend \
            ${LAYERDIR}/recipes-support/*/*.bb \
            ${LAYERDIR}/recipes-support/*/*.bbappend"

BBFILE_COLLECTIONS += "solidrun-rz-v2n"
BBFILE_PATTERN_solidrun-rz-v2n = "^${LAYERDIR}/"
BBFILE_PRIORITY_solidrun-rz-v2n= "16"
LAYERVERSION_solidrun-rz-v2n = "1"
LAYERSERIES_COMPAT_solidrun-rz-v2n = "scarthgap"
LAYERDEPENDS_solidrun-rz-v2n = "solidrun-rz"

# Satisfy meta-rz-boards dependency for meta-rz-drpai and meta-rz-opencva.
# The proprietary Renesas AI SDK layers expect a meta-rz-boards layer providing
# EVK board support. SolidRun provides its own board support via this layer.
# A placeholder recipe is provided so the collection pattern matches at least
# one file, avoiding the "No bb files matched" warning.
BBFILE_COLLECTIONS += "meta-rz-boards"
BBFILE_PATTERN_meta-rz-boards = "^${LAYERDIR}/recipes-rz-boards-compat/"
BBFILE_PRIORITY_meta-rz-boards = "1"
LAYERSERIES_COMPAT_meta-rz-boards = "scarthgap"
BBFILES += "${LAYERDIR}/recipes-rz-boards-compat/*/*.bb"

BBFILES_DYNAMIC += " \
    meta-rz-codecs:${LAYERDIR}/dynamic-layers/meta-rz-codecs/recipes-drp/*/*.bbappend \
    meta-rz-codecs:${LAYERDIR}/dynamic-layers/meta-rz-codecs/recipes-firmware/*/*.bbappend \
    meta-rz-codecs:${LAYERDIR}/dynamic-layers/meta-rz-codecs/recipes-kernel/*/*.bbappend \
    meta-rz-codecs:${LAYERDIR}/dynamic-layers/meta-rz-codecs/recipes-multimedia/*/*.bbappend \
    meta-rz-graphics:${LAYERDIR}/dynamic-layers/meta-rz-graphics/recipes-graphics/*/*.bbappend \
    meta-rz-graphics:${LAYERDIR}/dynamic-layers/meta-rz-graphics/recipes-kernel/*/*.bbappend \
    meta-rz-graphics:${LAYERDIR}/dynamic-layers/meta-rz-graphics/recipes-kernel/*/*/*.bbappend \
    rz-drpai:${LAYERDIR}/dynamic-layers/rz-drpai/recipes-bsp/*/*.bbappend \
    rz-drpai:${LAYERDIR}/dynamic-layers/rz-drpai/recipes-drp/*/*.bbappend \
    rz-drpai:${LAYERDIR}/dynamic-layers/rz-drpai/recipes-firmware/*/*.bbappend \
    rz-drpai:${LAYERDIR}/dynamic-layers/rz-drpai/recipes-kernel/*/*.bbappend \
    rz-drpai:${LAYERDIR}/dynamic-layers/rz-drpai/recipes-kernel/*/*/*.bbappend \
    rz-opencva:${LAYERDIR}/dynamic-layers/rz-opencva/recipes-bsp/*/*.bbappend \
    ros2-humble-layer:${LAYERDIR}/dynamic-layers/ros2-humble-layer/recipes-ros2-control/*/*.bbappend \
"

# Skip boot-overlays recipe from meta-rzg2l as V2N doesn't have SD/MMC overlays
BBMASK += "meta-rzg2l/recipes-bsp/boot-overlays"

# Skip dangling librealsense2 bbappend from meta-rzv2-ros-humble
BBMASK += "meta-rzv2-ros-humble/recipes-realsense2"

# Skip obsolete ROS2 control bbappends from meta-ros2-humble
# The patches fail to apply with current ROS2 version and are no longer needed
BBMASK += "meta-ros/meta-ros2-humble/recipes-bbappends/ros2-control/hardware-interface"
BBMASK += "meta-ros/meta-ros2-humble/recipes-bbappends/ros2-control/controller-interface"
BBMASK += "meta-ros/meta-ros2-humble/recipes-bbappends/ros2-control/controller-manager"